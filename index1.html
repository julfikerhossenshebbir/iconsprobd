<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>

    <!-- Link defined in one place -->
    <script>
        const redirectURL = "https://icons.mdjhs.com/";
        window.location.href = redirectURL;
    </script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e293b;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Redirecting...</h2>
    <p>If you are not redirected automatically,</p>
    <p><a id="fallbackLink" href="#">click here</a></p>
</div>

<script>
    // Set fallback link dynamically
    document.getElementById("fallbackLink").href = redirectURL;
</script>

</body>
</html>
